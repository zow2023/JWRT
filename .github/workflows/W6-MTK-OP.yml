name: W6-MTK-OP-Optimized

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/zow2023/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: W6/feeds.conf.default
  CONFIG_FILE: W6/mtkw6.config
  DIY_P1_SH: W6/diy-part1.sh
  DIY_P2_SH: W6/diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 🚀 优化环境与清理空间
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 仅保留最核心的清理，避免无效 IO
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang llvm flex bison g++ gawk \
             gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev dos2unix dwarves quilt npm jq \
             python3-setuptools rsync swig unzip zlib1g-dev file wget xsltproc zip zstd
        sudo npm install -g pnpm
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 📂 浅层克隆源码
      working-directory: /workdir
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: ⚡ 恢复下载缓存
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('**/mtkw6.config') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-dl-

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: fix rust & Load config
      run: |  
        cd openwrt
        sed -i 's/--set=llvm.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/' feeds/packages/lang/rust/Makefile
        [ -e files ] && mv files files
        [ -e $GITHUB_WORKSPACE/$CONFIG_FILE ] && mv $GITHUB_WORKSPACE/$CONFIG_FILE .config
        chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Patch Kernel Config (Netkit/eBPF)
      run: |
        # 针对你需要的 NETKIT 和 BTF 进行静默处理
        KERNEL_CONF="openwrt/target/linux/mediatek/filogic/config-6.6" 
        [ ! -f "$KERNEL_CONF" ] && KERNEL_CONF=$(find openwrt/target/linux -name "config-6.6" | head -n 1)
        sed -i 's/.*CONFIG_BPF_SYSCALL.*/CONFIG_BPF_SYSCALL=y/' "$KERNEL_CONF"
        sed -i 's/.*CONFIG_NETKIT.*/CONFIG_NETKIT=y/' "$KERNEL_CONF"
        sed -i 's/.*CONFIG_DEBUG_INFO_BTF.*/CONFIG_DEBUG_INFO_BTF=y/' "$KERNEL_CONF"

    - name: 📥 下载软件包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec rm -f {} \;

    - name: 🏗️ 编译固件
      id: compile
      run: |
        cd openwrt
        echo "Using $(nproc) threads"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 📦 整理并上传
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: env.FIRMWARE != ''
      with:
        name: OpenWrt_firmware_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
