name: Build X-WRT MediaTek MT7622

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      branch:
        description: "WRT Branch"
        required: true
        default: '26.04_b202606182110'

env:
  REPO_URL: https://github.com/x-wrt/x-wrt.git
  REPO_BRANCH: ${{ github.event.inputs.branch || '26.04_b202606182110' }}
  CONFIG_FILE: E8450/x.config
  DIY_P1_SH: E8450/diy-part-1.sh
  DIY_P2_SH: E8450/diy-part-3.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4 

    - name: 🚀 优化环境与清理空间
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # P3TERX 核心清理，最大化腾出系统盘空间
        docker rmi $(docker images -q) || true
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /mnt/tmp-pv.img || true
        
        sudo -E apt-get -qq update
        # 整合双方所需的完整编译依赖
        sudo -E apt-get -qq install mergerfs build-essential clang llvm flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libz-dev libssl-dev dos2unix dwarves quilt npm jq \
            python3-setuptools python3-pyelftools python3-dev rsync swig unzip zlib1g-dev file wget xsltproc zip zstd \
            asciidoc binutils bzip2 patch subversion uglifyjs git-core p7zip p7zip-full msmtp texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler tzdata
        
        sudo npm install -g pnpm
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 🛠️ 部署 MergerFS 空间合并
      run: |
        # 你的核心空间拓展魔法：通过 mergerfs 压榨 GitHub 托管服务器的磁盘
        sudo rm -rf /mnt/work /mnt/work_dir /data_dir
        sudo mkdir -p /data_dir /mnt/work_dir /mnt/work
        sudo chmod 777 /mnt/work /mnt/work_dir /data_dir
        sudo mergerfs -o defaults,allow_other,use_ino,category.create=mfs /mnt/work_dir:/data_dir /mnt/work
        
        # 规范化：创建工作区并将变量写入全局环境
        sudo mkdir -p /mnt/work/openwrt
        sudo chown $USER:$GROUPS /mnt/work/openwrt
        echo "WORK_DIR=/mnt/work/openwrt" >> $GITHUB_ENV

    - name: Clone source code
      env:
        REPO_BRANCH: ${{ github.event.inputs.branch }}
      run: |
        df -hT
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL $WORK_DIR
        ln -sf $WORK_DIR $GITHUB_WORKSPACE/openwrt

    - name: Update feeds
      run: |
        cd $WORK_DIR
        ./scripts/feeds update -a

    - name: Install feeds
      run: |
        cd $WORK_DIR
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cd $WORK_DIR
        # 复制 X-WRT 预置的 mt7622 配置文件
        cp feeds/x/rom/lede/config.mediatek-mt7622 .config
        
        # 你的特定设备配置注入逻辑（Linksys E8450）
        sed -i '/CONFIG_TARGET_DEVICE_/d' .config
        sed -i '/CONFIG_TARGET_MULTI_PROFILE/d' .config
        echo "# CONFIG_TARGET_MULTI_PROFILE is not set" >> .config
        echo "CONFIG_TARGET_DEVICE_mediatek_mt7622_DEVICE_linksys_e8450-ubi=y" >> .config

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download package
      id: package
      run: |
        cd $WORK_DIR
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd $WORK_DIR
        echo -e "$(nproc) thread compile"
        # P3TERX 经典多线程转单线程高成功率编译结构
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        
        # 动态抓取设备名称与时间戳，用于 Artifact 命名
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Free Disk Space After Build
      run: |
        sudo rm -rf /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/lib/android/sdk/ndk /usr/share/dotnet /opt/ghc /usr/local/share/boost
        sudo apt-get clean
        df -h

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: WRT_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd $WORK_DIR/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: X-WRT_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

